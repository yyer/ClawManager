metadata:
  name: clawmanager-app-leaderelection
  namespace: clawmanager-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clawmanager-app-leaderelection
subjects:
  - kind: ServiceAccount
    name: clawmanager-app
    namespace: clawmanager-system
