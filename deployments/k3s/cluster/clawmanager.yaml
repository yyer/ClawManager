            - name: OBJECT_STORAGE_FORCE_PATH_STYLE
              value: "true"
            - name: K8S_MODE
              value: "incluster"
            - name: K8S_NAMESPACE
              value: "clawmanager"
            - name: K8S_STORAGE_CLASS
              value: "longhorn"
            - name: CLAWMANAGER_STORAGE_PROFILE
              value: "cluster"
            - name: K8S_HOSTPATH_FALLBACK_ENABLED
              value: "false"
            - name: K8S_PVC_BIND_TIMEOUT
              value: "2m"
            - name: K8S_CONTROL_PLANE_STORAGE_CLASS
              value: "longhorn"
            - name: K8S_INSTANCE_STORAGE_CLASS
              value: "longhorn"
            - name: K8S_WORKSPACE_STORAGE_CLASS
              value: "longhorn-rwx"
            - name: K8S_WORKSPACE_ACCESS_MODE
              value: "ReadWriteMany"
            - name: CLAWMANAGER_WORKSPACE_ARCHIVE_MAX_MIB
              value: "500"
            - name: PLATFORM_REDIS_URL
              value: "redis://clawmanager-redis.clawmanager-system.svc.cluster.local:6379/0"
            - name: TEAM_REDIS_URL
              value: "redis://clawmanager-redis.clawmanager-system.svc.cluster.local:6379/0"
            - name: CLAWMANAGER_TEAM_REDIS_URL
              value: "redis://clawmanager-redis.clawmanager-system.svc.cluster.local:6379/0"
            - name: CLAWMANAGER_TEAM_MANAGER_BASE_URL
              value: "http://clawmanager-gateway.clawmanager-system.svc.cluster.local:9001"
            - name: RUNTIME_NAMESPACE
              value: "clawmanager-system"
            - name: RUNTIME_WORKSPACE_ROOT
              value: "/workspaces"
            - name: RUNTIME_WORKSPACE_PVC_CLAIM
              value: "clawmanager-workspaces"
            - name: RUNTIME_MAX_GATEWAYS_PER_POD
              value: "100"
            - name: RUNTIME_GATEWAY_PORT_START
              value: "20000"
            - name: RUNTIME_GATEWAY_PORT_END
              value: "20099"
            - name: RUNTIME_SCHEDULER_ENABLED
              value: "true"
            - name: RUNTIME_HEARTBEAT_TIMEOUT
              value: "10s"
            - name: RUNTIME_AGENT_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: runtime-agent-control-token
            - name: RUNTIME_AGENT_REPORT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: runtime-agent-report-token
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: openclaw-gateway-token
            - name: SKILL_SCANNER_ENABLED
              value: "true"
            - name: SKILL_SCANNER_BASE_URL
              value: "http://skill-scanner.clawmanager-system.svc.cluster.local:8000"
            - name: SKILL_SCANNER_TIMEOUT_SECONDS
              value: "120"
            - name: SKILL_SCANNER_NAMESPACE
              value: "clawmanager-system"
            - name: SKILL_SCANNER_DEPLOYMENT
              value: "skill-scanner"
          volumeMounts:
            - name: tls-cert
              mountPath: /var/run/clawreef-tls
              readOnly: true
            - name: workspaces
              mountPath: /workspaces
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: tls-cert
          secret:
            secretName: clawmanager-tls
            optional: true
        - name: workspaces
          persistentVolumeClaim:
            claimName: clawmanager-workspaces
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-runtime
  namespace: clawmanager-system
  labels:
    app: openclaw-runtime
    clawmanager.io/runtime-type: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-runtime
      clawmanager.io/runtime-type: openclaw
  template:
    metadata:
      labels:
        app: openclaw-runtime
        clawmanager.io/runtime-type: openclaw
    spec:
      containers:
        - name: runtime
          image: ghcr.io/yuan-lab-llm/agentsruntime/openclaw-lite:latest
          imagePullPolicy: Always
          env:
            - name: CLAWMANAGER_RUNTIME_TYPE
              value: openclaw
            - name: CLAWMANAGER_BACKEND_URL
              value: "http://clawmanager-gateway.clawmanager-system.svc.cluster.local:9001"
            - name: CLAWMANAGER_RUNTIME_DEPLOYMENT_NAME
              value: openclaw-runtime
            - name: CLAWMANAGER_RUNTIME_IMAGE_REF
              value: ghcr.io/yuan-lab-llm/agentsruntime/openclaw-lite:latest
            - name: RUNTIME_WORKSPACE_ROOT
              value: /workspaces
            - name: RUNTIME_GATEWAY_PORT_START
              value: "20000"
            - name: RUNTIME_GATEWAY_PORT_END
              value: "20099"
            - name: RUNTIME_AGENT_LISTEN_ADDR
              value: "0.0.0.0:19090"
            - name: RUNTIME_AGENT_PUBLIC_PORT
              value: "19090"
            - name: RUNTIME_GATEWAY_COMMAND
              value: "/usr/local/bin/openclaw gateway run --allow-unconfigured --auth token --bind lan --force"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: openclaw-gateway-token
            - name: RUNTIME_AGENT_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: runtime-agent-control-token
            - name: RUNTIME_AGENT_REPORT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: clawmanager-secrets
                  key: runtime-agent-report-token
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: agent
              containerPort: 19090
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: clawmanager-workspaces
---
