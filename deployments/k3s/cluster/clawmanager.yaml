      host_info_json LONGTEXT NULL,
      session_token VARCHAR(255) NULL,
      session_expires_at TIMESTAMP NULL,
      last_heartbeat_at TIMESTAMP NULL,
      last_reported_at TIMESTAMP NULL,
      last_seen_ip VARCHAR(45) NULL,
