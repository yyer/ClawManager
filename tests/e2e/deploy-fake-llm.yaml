# 把 fake_llm.py 起在 clawreef-system 命名空间，service:8080 暴露。
# 应用前在 host 机上做：
#   kubectl -n clawreef-system create configmap fake-llm-src \
#     --from-file=fake_llm.py=./fake_llm.py \
#     --dry-run=client -o yaml | kubectl apply -f -
# 然后 kubectl apply -f deploy-fake-llm.yaml
#
# 改了 fake_llm.py 后重做 configmap + kubectl rollout restart deployment/fake-llm。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-llm
  namespace: clawreef-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-llm
  template:
    metadata:
      labels:
        app: fake-llm
    spec:
      containers:
        - name: fake-llm
          image: python:3.12-slim
          command: ["python3", "/app/fake_llm.py"]
          env:
            - name: PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - name: src
              mountPath: /app
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: src
          configMap:
            name: fake-llm-src
---
apiVersion: v1
kind: Service
metadata:
  name: fake-llm
  namespace: clawreef-system
spec:
  selector:
    app: fake-llm
  ports:
    - name: http
      port: 8080
      targetPort: 8080
